name: Node-CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Nodejs
        uses: actions/setup-node@v5

      - name: Install dependencies
        working-directory: frontend/socialcleanai
        run: npm install

  test:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name:  test
        run: npm test --if-present

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        run: npm run build
    


        
